name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          SAUCE_STANDARD_USER: ${{ secrets.SAUCE_STANDARD_USER }}
          SAUCE_LOCKED_USER: ${{ secrets.SAUCE_LOCKED_USER }}
          SAUCE_PROBLEM_USER: ${{ secrets.SAUCE_PROBLEM_USER }}
          SAUCE_ERROR_USER: ${{ secrets.SAUCE_ERROR_USER }}
          SAUCE_VISUAL_USER: ${{ secrets.SAUCE_VISUAL_USER }}
          SAUCE_PERFORMANCE_USER: ${{ secrets.SAUCE_PERFORMANCE_USER }}
          SAUCE_PASSWORD: ${{ secrets.SAUCE_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7